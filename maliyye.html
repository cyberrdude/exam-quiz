    overflow: hidden;
  }

    transition: width 0.3s ease;
  }
  .question-header {
    display: flex;

    align-items: center;
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 2px solid #f0f0f0;
  }
  .question-number {
    font-size: 14px;
    color: #666;
    font-weight: 600;
  }
  #question { 
    font-size: 18px;
    line-height: 1.6;
    margin-bottom: 25px;
    color: #333;
  }
  .options-grid {
    display: grid;
    gap: 12px;
    margin-bottom: 20px;
  }
  .option-btn { 
    padding: 15px 20px;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    cursor: pointer;
    background: white;
    text-align: left;
    transition: all 0.2s ease;
    font-size: 16px;
    color: #333;
  }
  .option-btn:hover:not(:disabled) { 
    background: #f8f9ff;
    border-color: #667eea;
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
  }
  .option-btn.correct {
    background: #d4edda;
    border-color: #28a745;
    color: #155724;
  }
  .option-btn.incorrect {
    background: #f8d7da;
    border-color: #dc3545;
    color: #721c24;
  }
  .option-btn.selected {
    border-width: 3px;
  }
  .option-btn:disabled {
    cursor: not-allowed;
    opacity: 0.7;
  }
  #next-btn { 
    display: block;
    margin: 20px auto 0;
    padding: 12px 40px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 600;
    transition: transform 0.2s ease;
  }
  #next-btn:hover { 
    transform: scale(1.05);
  }
  #next-btn:disabled {
    background: #ccc;
    cursor: not-allowed;
    transform: none;
  }
  #result-container { 
    text-align: center;
    background: white;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  }
  .score-display {
    font-size: 48px;
    font-weight: bold;
    color: #667eea;
    margin: 20px 0;
  }
  .score-percentage {
    font-size: 24px;
    color: #666;
    margin-bottom: 30px;
  }

 .back-btn {
  display: inline-block;
  margin-bottom: 20px;
  background: white;
  padding: 10px 18px;
  border-radius: 8px;
  font-size: 14px;

// Shuffle array function
function shuffleArray(array) {
  const newArray = [...array];
  for (let i = newArray.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
  }
  return newArray;
}

// Prepare questions
const originalQuestions = [...questions];
questions = shuffleArray(questions);

// Store correct answer for each question before shuffling options
questions.forEach((q, idx) => {
  const answerMap = {"A": 0, "B": 1, "C": 2, "D": 3};
  const correctOptionIndex = answerMap[q.answer];
  const correctOption = q.options[correctOptionIndex];
  
  // Shuffle options
  q.options = shuffleArray(q.options);
  
  // Find new index of correct answer after shuffle
  q.correctOption = correctOption;
  q.correctIndex = q.options.indexOf(correctOption);
});

let currentQuestionIndex = 0;
let score = 0;
let userAnswers = []; // Track user answers for review
let selectedAnswer = null;

function updateProgress() {
  const progress = ((currentQuestionIndex + 1) / questions.length) * 100;
  document.getElementById("progress").style.width = progress + "%";
}

function updateCounters() {
  document.getElementById("question-counter").textContent = 
    `Sual ${currentQuestionIndex + 1} / ${questions.length}`;
  document.getElementById("score-counter").textContent = `Düzgün: ${score}`;
}

function showQuestion() {
  const q = questions[currentQuestionIndex];
  selectedAnswer = null;
  
  document.getElementById("question").textContent = q.question;
  
  const optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";
  
  q.options.forEach((opt, idx) => {
    const btn = document.createElement("button");
    btn.className = "option-btn";
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(idx, btn);
    optionsDiv.appendChild(btn);
  });
  
  document.getElementById("next-btn").disabled = true;
  updateProgress();
  updateCounters();
}

function selectAnswer(selectedIndex, btnElement) {
  const q = questions[currentQuestionIndex];
  
  // Disable all buttons after selection
  const allButtons = document.querySelectorAll(".option-btn");
  allButtons.forEach(btn => btn.disabled = true);
  
  selectedAnswer = selectedIndex;
  const isCorrect = selectedIndex === q.correctIndex;
  
  // Store user answer
  userAnswers.push({
    question: q.question,
    questionNumber: q.number,
    userAnswer: q.options[selectedIndex],
    correctAnswer: q.correctOption,
    isCorrect: isCorrect
  });
  
  // Highlight correct and incorrect answers
  allButtons.forEach((btn, idx) => {
    if (idx === q.correctIndex) {
      btn.classList.add("correct");
    } else if (idx === selectedIndex && !isCorrect) {
      btn.classList.add("incorrect", "selected");
    }
  });
  
  if (isCorrect) {
    score++;
    updateCounters();
  }
  
  document.getElementById("next-btn").disabled = false;
}

document.getElementById("next-btn").onclick = () => {
  currentQuestionIndex++;
  if (currentQuestionIndex < questions.length) {
    showQuestion();
  } else {
    showResult();
  }
};

function showResult() {
  document.getElementById("quiz-container").style.display = "none";
  document.getElementById("result-container").style.display = "block";
  
  const percentage = Math.round((score / questions.length) * 100);
  
  document.getElementById("score").textContent = `${score} / ${questions.length}`;
  document.getElementById("percentage").textContent = `${percentage}%`;
  
  // Show mistakes
  const mistakes = userAnswers.filter(a => !a.isCorrect);
  
  if (mistakes.length > 0) {
    document.getElementById("mistakes-section").style.display = "block";
    const mistakesList = document.getElementById("mistakes-list");
    
    mistakes.forEach((mistake, idx) => {
      const mistakeDiv = document.createElement("div");
      mistakeDiv.className = "mistake-item";
      mistakeDiv.innerHTML = `
        <div class="mistake-question">${idx + 1}. ${mistake.question}</div>
        <div class="mistake-answers">
          <div class="your-answer">❌ Sizin cavabınız: ${mistake.userAnswer}</div>
          <div class="correct-answer">✓ Düzgün cavab: ${mistake.correctAnswer}</div>
        </div>
      `;
      mistakesList.appendChild(mistakeDiv);
    });
  }
}

showQuestion();
