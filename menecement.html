    --brand: #2563eb;
    --brand-dark: #1d4ed8;
    --good: #16a34a;
    --good-soft: #dcfce7;

  .back-btn, .ghost-btn {

  .portion-meta { color: var(--muted); display: block; font-size: 13px; font-weight: 700; margin-top: 8px; }

  .question-feed { height: 100svh; overflow-y: auto; scroll-behavior: smooth; scroll-snap-type: y mandatory; -webkit-overflow-scrolling: touch; }
  .question-slide {

  .question-card, .result-card {

  .answer-flash { inset: 0; opacity: 0; pointer-events: none; position: fixed; z-index: 40; }

  .result-card { text-align: center; }

  @keyframes correctPulse { 0% { transform: scale(1); } 35% { transform: scale(1.055); } 70% { transform: scale(0.992); } 100% { transform: scale(1); } }
  @keyframes wrongShake { 0%, 100% { transform: translateX(0); } 15% { transform: translateX(-11px) rotate(-0.8deg); } 30% { transform: translateX(10px) rotate(0.8deg); } 45% { transform: translateX(-8px) rotate(-0.6deg); } 60% { transform: translateX(6px) rotate(0.4deg); } 75% { transform: translateX(-3px); } }

  @keyframes cardWrongImpact { 0%, 100% { transform: translateX(0); } 18% { transform: translateX(-8px); } 36% { transform: translateX(8px); } 54% { transform: translateX(-5px); } 72% { transform: translateX(3px); } }

  @media (prefers-reduced-motion: reduce) {

  }
</style>
</head>

const PART_SIZE = 50;
const answerMap = { A: 0, B: 1, C: 2, D: 3, E: 4 };
const sourceQuestions = questions.map((q, index) => ({
  ...q,
  number: q.number || `${index + 1}.`,
  options: [...q.options]
}));

const portionScreen = document.getElementById("portion-screen");
const portionGrid = document.getElementById("portion-grid");
const portionCopy = document.getElementById("portion-copy");
const quizScreen = document.getElementById("quiz-screen");
const feed = document.getElementById("question-feed");
const progress = document.getElementById("progress");
const scoreCounter = document.getElementById("score-counter");
const mainMenuLink = document.getElementById("main-menu-link");
const quizTitle = document.getElementById("quiz-title");
const portionEyebrow = document.getElementById("portion-eyebrow");
const portionHeading = document.getElementById("portion-heading");

let activeQuestions = [];
let selectedPortion = null;
let userAnswers = [];
let score = 0;
let activeIndex = 0;
let furthestUnlocked = 0;
let resultRendered = false;
let scrollTimer = null;
let audioContext = null;
let flashLayer = null;
let skipToast = null;
let lastSkipEffectAt = 0;

function applyConfig() {
  document.title = QUIZ_CONFIG.pageTitle || `${QUIZ_CONFIG.quizName} Quiz`;
  mainMenuLink.href = QUIZ_CONFIG.homeUrl;
  mainMenuLink.textContent = QUIZ_CONFIG.homeLabel;
  quizTitle.textContent = QUIZ_CONFIG.quizName;
  portionEyebrow.textContent = QUIZ_CONFIG.portionEyebrow;
  portionHeading.textContent = QUIZ_CONFIG.portionHeading;
}

mainMenuLink.addEventListener("click", playActionSound);

function shuffleArray(array) {
  const newArray = [...array];
  for (let i = newArray.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
  }
  return newArray;
}

function buildPortions() {
  if (sourceQuestions.length <= PART_SIZE) {
    return [{ label: "Full", start: 0, end: sourceQuestions.length, full: true }];
  }
  const portions = [];
  for (let start = 0; start < sourceQuestions.length; start += PART_SIZE) {
    const end = Math.min(start + PART_SIZE, sourceQuestions.length);
    portions.push({ label: `${start + 1}-${end}`, start, end, full: false });
  }
  portions.push({ label: "Full", start: 0, end: sourceQuestions.length, full: true });
  return portions;
}

function renderPortions() {
  portionGrid.innerHTML = "";
  portionCopy.textContent = `${sourceQuestions.length} ${QUIZ_CONFIG.questionCountLabel} available. Pick a 50-question part or take the full quiz.`;
  buildPortions().forEach((portion) => {
    const button = document.createElement("button");
    button.className = "portion-btn";
    button.type = "button";
    const range = document.createElement("span");
    range.className = "portion-range";
    range.textContent = portion.label;
    const meta = document.createElement("span");
    meta.className = "portion-meta";
    meta.textContent = `${portion.end - portion.start} ${QUIZ_CONFIG.questionCountLabel}`;
    button.append(range, meta);
    button.addEventListener("click", () => { playStartSound(); startQuiz(portion); });
    portionGrid.appendChild(button);
  });
}

function prepareQuestion(question, absoluteIndex) {
  const correctOption = question.options[answerMap[question.answer]];
  const shuffledOptions = shuffleArray(question.options);
  return {
    ...question,
    absoluteIndex,
    options: shuffledOptions,
    correctOption,
    correctIndex: shuffledOptions.indexOf(correctOption)
  };
}

function startQuiz(portion) {
  selectedPortion = portion;

  // FIX 2: Shuffle question order when Full mode is selected
  let orderedQuestions = sourceQuestions.slice(portion.start, portion.end);
  if (portion.full) {
    orderedQuestions = shuffleArray(orderedQuestions);
  }

  activeQuestions = orderedQuestions.map((question, index) =>
    prepareQuestion(question, portion.start + index)
  );

  userAnswers = Array(activeQuestions.length).fill(null);
  score = 0;
  activeIndex = 0;
  furthestUnlocked = 0;
  resultRendered = false;

  portionScreen.classList.add("hidden");
  quizScreen.classList.remove("hidden");
  feed.innerHTML = "";
  activeQuestions.forEach(renderQuestion);
  updateHud();
  window.scrollTo({ top: 0, behavior: "auto" });
  feed.scrollTo({ top: 0, behavior: "auto" });
}

function renderQuestion(question, index) {
  const slide = document.createElement("section");
  slide.className = "question-slide";
  slide.dataset.index = String(index);

  const card = document.createElement("article");
  card.className = "question-card";

  const confetti = document.createElement("div");
  confetti.className = "confetti";

  const meta = document.createElement("div");
  meta.className = "question-meta";
  const current = document.createElement("span");
  current.textContent = `Question ${index + 1} / ${activeQuestions.length}`;
  const original = document.createElement("span");
  original.textContent = `Original ${question.number}`;

  const text = document.createElement("div");
  text.className = "question-text";
  text.textContent = question.question;

  const options = document.createElement("div");
  options.className = "options-grid";

  question.options.forEach((option, optionIndex) => {
    const button = document.createElement("button");
    button.className = "option-btn";
    button.type = "button";
    button.dataset.optionIndex = String(optionIndex);

    if (index > furthestUnlocked) {
      button.disabled = true;
      button.classList.add("locked-ahead");
    }

    const letter = document.createElement("span");
    letter.className = "option-letter";
    letter.textContent = String.fromCharCode(65 + optionIndex);
    const label = document.createElement("span");
    label.textContent = option;

    button.append(letter, label);
    button.addEventListener("click", () => {
      if (index > furthestUnlocked) {
        showSkipEffect();
        feed.scrollTo({ top: getSlideTop(furthestUnlocked), behavior: "smooth" });
        return;
      }
      selectAnswer(index, optionIndex, card);
    });
    options.appendChild(button);
  });

  const hint = document.createElement("div");
  hint.className = "scroll-hint";
  hint.textContent = "Answer to unlock the next card.";

  meta.append(current, original);
  card.append(confetti, meta, text, options, hint);
  slide.appendChild(card);
  feed.appendChild(slide);
}

function unlockQuestion(index) {
  const slide = feed.querySelector(`[data-index="${index}"]`);
  if (!slide) return;
  slide.querySelectorAll(".option-btn.locked-ahead").forEach(btn => {
    btn.disabled = false;
    btn.classList.remove("locked-ahead");
  });
}

function selectAnswer(questionIndex, optionIndex, card) {
  if (userAnswers[questionIndex]) return;

  const question = activeQuestions[questionIndex];
  const isCorrect = optionIndex === question.correctIndex;
  const buttons = card.querySelectorAll(".option-btn");
  const hint = card.querySelector(".scroll-hint");

  buttons.forEach((button, index) => {
    button.disabled = true;
    if (index === question.correctIndex) button.classList.add("correct");
    if (index === optionIndex && !isCorrect) button.classList.add("incorrect");
    if (index !== question.correctIndex && index !== optionIndex) button.classList.add("dimmed");
  });

  if (isCorrect) score++;

  userAnswers[questionIndex] = {
    question: question.question,
    questionNumber: question.number,
    userAnswer: question.options[optionIndex],
    correctAnswer: question.correctOption,
    isCorrect
  };

  card.classList.add("answered");
  card.classList.add(isCorrect ? "correct-answer" : "wrong-answer");
  hint.textContent = questionIndex === activeQuestions.length - 1 ? "Scroll to see your result." : "Scroll down for the next question.";

  furthestUnlocked = Math.max(furthestUnlocked, questionIndex + 1);

  unlockQuestion(furthestUnlocked);

  if (questionIndex === activeQuestions.length - 1) renderResult();

  updateHud();
  playSound(isCorrect);
  triggerFlash(isCorrect);
  triggerHaptics(isCorrect);
  burstParticles(card, isCorrect);
}

function updateHud() {
  const answeredCount = userAnswers.filter(Boolean).length;
  const percent = activeQuestions.length ? (answeredCount / activeQuestions.length) * 100 : 0;
  progress.style.width = `${percent}%`;
  scoreCounter.textContent = `${score} / ${activeQuestions.length}`;
}

function getSlideTop(index) {
  const slide = feed.querySelector(`[data-index="${index}"]`);
  return slide ? slide.offsetTop : index * feed.clientHeight;
}

function getNearestSlideIndex() {
  const slides = [...feed.querySelectorAll(".question-slide")];
  let closestIndex = 0;
  let closestDistance = Number.POSITIVE_INFINITY;
  slides.forEach((slide) => {
    const distance = Math.abs(slide.offsetTop - feed.scrollTop);
    if (distance < closestDistance) {
      closestDistance = distance;
      closestIndex = Number(slide.dataset.index);
    }
  });
  return closestIndex;
}

function renderResult() {
  if (resultRendered) return;
  resultRendered = true;

  const slide = document.createElement("section");
  slide.className = "question-slide";
  slide.dataset.index = String(activeQuestions.length);

  const card = document.createElement("article");
  card.className = "result-card finished";

  const confetti = document.createElement("div");
  confetti.className = "confetti";

  const eyebrow = document.createElement("div");
  eyebrow.className = "eyebrow";
  eyebrow.textContent = selectedPortion.full ? "Full quiz complete" : `Part ${selectedPortion.label} complete`;

  const title = document.createElement("h1");
  title.textContent = "Finished";

  const scoreDisplay = document.createElement("div");
  scoreDisplay.className = "score-display";
  scoreDisplay.textContent = `${score}/${activeQuestions.length}`;

  const percentage = document.createElement("div");
  percentage.className = "score-percentage";
  percentage.textContent = `${Math.round((score / activeQuestions.length) * 100)}% correct`;

  const actions = document.createElement("div");
  actions.className = "result-actions";

  const retry = document.createElement("button");
  retry.className = "primary-btn";
  retry.type = "button";
  retry.textContent = "Retry";
  retry.addEventListener("click", () => { playActionSound(); startQuiz(selectedPortion); });

  const choose = document.createElement("button");
  choose.className = "ghost-btn";
  choose.type = "button";
  choose.textContent = "Select different portion";
  choose.addEventListener("click", () => { playActionSound(); showPortionPicker(); });

  const menu = document.createElement("a");
  menu.className = "ghost-btn";
  menu.href = QUIZ_CONFIG.homeUrl;
  menu.textContent = QUIZ_CONFIG.homeLabel;
  menu.addEventListener("click", playActionSound);

  actions.append(retry, choose, menu);
  card.append(confetti, eyebrow, title, scoreDisplay, percentage, actions);

  const mistakes = userAnswers.filter((answer) => answer && !answer.isCorrect);
  if (mistakes.length) {
    const section = document.createElement("div");
    section.className = "mistakes-section";
    const heading = document.createElement("h2");
    heading.textContent = "Review mistakes";
    section.appendChild(heading);
    mistakes.forEach((mistake, index) => {
      const item = document.createElement("div");
      item.className = "mistake-item";
      const question = document.createElement("div");
      question.className = "mistake-question";
      question.textContent = `${index + 1}. ${mistake.question}`;
      const yours = document.createElement("div");
      yours.className = "your-answer";
      yours.textContent = `Your answer: ${mistake.userAnswer}`;
      const correct = document.createElement("div");
      correct.className = "correct-answer";
      correct.textContent = `Correct answer: ${mistake.correctAnswer}`;
      item.append(question, yours, correct);
      section.appendChild(item);
    });
    card.appendChild(section);
  }

  slide.appendChild(card);
  feed.appendChild(slide);
  window.setTimeout(() => {
    burstParticles(card, true, 72);
    playFinishSound();
    triggerFlash(true);
  }, 120);
}

function showPortionPicker() {
  quizScreen.classList.add("hidden");
  portionScreen.classList.remove("hidden");
  feed.innerHTML = "";
  window.scrollTo({ top: 0, behavior: "auto" });
}

function playSound(isCorrect) {
  try {
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if (!AudioCtx) return;
    audioContext = audioContext || new AudioCtx();
    const now = audioContext.currentTime;
    const master = audioContext.createGain();
    const notes = isCorrect
      ? [{ frequency: 523.25, start: 0, duration: 0.11, type: "triangle", volume: 0.2 }, { frequency: 659.25, start: 0.08, duration: 0.12, type: "triangle", volume: 0.22 }, { frequency: 987.77, start: 0.17, duration: 0.2, type: "sine", volume: 0.24 }]
      : [{ frequency: 196, start: 0, duration: 0.16, type: "sawtooth", volume: 0.18 }, { frequency: 146.83, start: 0.1, duration: 0.22, type: "square", volume: 0.15 }];
    master.gain.setValueAtTime(0.9, now);
    master.connect(audioContext.destination);
    notes.forEach((note) => {
      const oscillator = audioContext.createOscillator();
      const gain = audioContext.createGain();
      const start = now + note.start;
      const end = start + note.duration;
      oscillator.type = note.type;
      oscillator.frequency.setValueAtTime(note.frequency, start);
      if (!isCorrect) oscillator.frequency.exponentialRampToValueAtTime(note.frequency * 0.72, end);
      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.exponentialRampToValueAtTime(note.volume, start + 0.018);
      gain.gain.exponentialRampToValueAtTime(0.0001, end);
      oscillator.connect(gain);
      gain.connect(master);
      oscillator.start(start);
      oscillator.stop(end + 0.02);
    });
  } catch (e) {}
}

function playStartSound() {
  try {
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if (!AudioCtx) return;
    audioContext = audioContext || new AudioCtx();
    const now = audioContext.currentTime;
    [{ frequency: 329.63, start: 0, duration: 0.1, volume: 0.16 }, { frequency: 493.88, start: 0.055, duration: 0.12, volume: 0.18 }, { frequency: 659.25, start: 0.12, duration: 0.16, volume: 0.2 }].forEach((note) => {
      const oscillator = audioContext.createOscillator();
      const gain = audioContext.createGain();
      const start = now + note.start;
      const end = start + note.duration;
      oscillator.type = "triangle";
      oscillator.frequency.setValueAtTime(note.frequency, start);
      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.exponentialRampToValueAtTime(note.volume, start + 0.015);
      gain.gain.exponentialRampToValueAtTime(0.0001, end);
      oscillator.connect(gain);
      gain.connect(audioContext.destination);
      oscillator.start(start);
      oscillator.stop(end + 0.02);
    });
  } catch (e) {}
}

function playActionSound() {
  try {
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if (!AudioCtx) return;
    audioContext = audioContext || new AudioCtx();
    const now = audioContext.currentTime;
    const oscillator = audioContext.createOscillator();
    const gain = audioContext.createGain();
    oscillator.type = "triangle";
    oscillator.frequency.setValueAtTime(587.33, now);
    oscillator.frequency.exponentialRampToValueAtTime(739.99, now + 0.09);
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(0.12, now + 0.012);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.13);
    oscillator.connect(gain);
    gain.connect(audioContext.destination);
    oscillator.start(now);
    oscillator.stop(now + 0.15);
  } catch (e) {}
}

function playLockSound() {
  try {
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if (!AudioCtx) return;
    audioContext = audioContext || new AudioCtx();
    const now = audioContext.currentTime;
    const oscillator = audioContext.createOscillator();
    const gain = audioContext.createGain();
    oscillator.type = "square";
    oscillator.frequency.setValueAtTime(330, now);
    oscillator.frequency.exponentialRampToValueAtTime(180, now + 0.18);
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(0.16, now + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.22);
    oscillator.connect(gain);
    gain.connect(audioContext.destination);
    oscillator.start(now);
    oscillator.stop(now + 0.24);
  } catch (e) {}
}

function playFinishSound() {
  try {
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if (!AudioCtx) return;
    audioContext = audioContext || new AudioCtx();
    const now = audioContext.currentTime;
    [392, 523.25, 659.25, 783.99, 1046.5].forEach((frequency, index) => {
      const oscillator = audioContext.createOscillator();
      const gain = audioContext.createGain();
      const start = now + index * 0.075;
      const end = start + 0.22;
      oscillator.type = index === 4 ? "sine" : "triangle";
      oscillator.frequency.setValueAtTime(frequency, start);
      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.exponentialRampToValueAtTime(0.2, start + 0.018);
      gain.gain.exponentialRampToValueAtTime(0.0001, end);
      oscillator.connect(gain);
      gain.connect(audioContext.destination);
      oscillator.start(start);
      oscillator.stop(end + 0.02);
    });
  } catch (e) {}
}

function triggerFlash(isCorrect) {
  flashLayer = flashLayer || document.createElement("div");
  if (!flashLayer.parentNode) document.body.appendChild(flashLayer);
  flashLayer.className = `answer-flash ${isCorrect ? "correct" : "incorrect"}`;
  window.setTimeout(() => { flashLayer.className = "answer-flash"; }, 700);
}

function triggerLockedFlash() {
  flashLayer = flashLayer || document.createElement("div");
  if (!flashLayer.parentNode) document.body.appendChild(flashLayer);
  flashLayer.className = "answer-flash locked";
  window.setTimeout(() => { flashLayer.className = "answer-flash"; }, 820);
}

function triggerHaptics(isCorrect) {
  if (!navigator.vibrate) return;
  navigator.vibrate(isCorrect ? [18, 28, 18] : [42, 32, 42]);
}

function burstParticles(card, isCorrect, overrideCount) {
  const container = card.querySelector(".confetti");
  const colors = isCorrect ? ["#2563eb","#16a34a","#f59e0b","#22c55e","#0f766e"] : ["#dc2626","#f97316","#991b1b","#fca5a5","#7f1d1d"];
  const count = overrideCount || (isCorrect ? 48 : 28);
  container.innerHTML = "";
  for (let i = 0; i < count; i++) {
    const piece = document.createElement(isCorrect ? "i" : "span");
    if (isCorrect) { piece.style.background = colors[i % colors.length]; }
    else { piece.className = "x-particle"; piece.textContent = "X"; piece.style.color = colors[i % colors.length]; piece.style.setProperty("--r", `${Math.round(Math.random() * 520 - 260)}deg`); }
    piece.style.setProperty("--x", `${Math.round(Math.random() * 620 - 310)}px`);
    piece.style.setProperty("--y", `${Math.round(Math.random() * 420 - 290)}px`);
    piece.style.animationDelay = `${Math.random() * 120}ms`;
    container.appendChild(piece);
  }
  window.setTimeout(() => { container.innerHTML = ""; }, 1400);
}

function showSkipEffect() {
  const now = Date.now();
  if (now - lastSkipEffectAt < 850) return;
  lastSkipEffectAt = now;

  const currentSlide = feed.querySelector(`[data-index="${furthestUnlocked}"]`);
  const card = currentSlide ? currentSlide.querySelector(".question-card") : null;
  if (card) { card.classList.remove("lock-bounce"); void card.offsetWidth; card.classList.add("lock-bounce"); }

  skipToast = skipToast || document.createElement("div");
  if (!skipToast.parentNode) document.body.appendChild(skipToast);
  skipToast.className = "skip-toast";
  skipToast.textContent = "Answer this question first";
  void skipToast.offsetWidth;
  skipToast.classList.add("show");

  triggerLockedFlash();
  playLockSound();
  triggerHaptics(false);
}

feed.addEventListener("scroll", () => {
  window.clearTimeout(scrollTimer);
  scrollTimer = window.setTimeout(() => {
    const nextIndex = getNearestSlideIndex();
    if (nextIndex > furthestUnlocked) {
      showSkipEffect();
      feed.scrollTo({ top: getSlideTop(furthestUnlocked), behavior: "smooth" });
      return;
    }
    activeIndex = Math.min(nextIndex, activeQuestions.length);
    updateHud();
  }, 70);
});

applyConfig();

if (sourceQuestions.length > PART_SIZE) {
  renderPortions();
} else {
  startQuiz({ label: "Full", start: 0, end: sourceQuestions.length, full: true });
}
</script>
</body>
</html>
